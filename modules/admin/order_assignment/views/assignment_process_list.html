<div class="container-fluid"  id="main-container">
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="header">
					<h2>
						<%=  __("admin.order_assignment.order_assignment_process"); %>&nbsp;&nbsp;(<%=unique_order_id%>)
					</h2>
					<ul class="header-dropdown m-r--5 btn-right-top-margin">
						<li>
							<a  class="refresh-btn">
								<button type="button" class="btn btn-sm bg-indigo waves-effect">
									<%= __("admin.order_assignment.refresh"); %>
								</button>
							</a>
						</li>
					</ul>
				</div>
				<div class="body">
					<table id="datatable-listing" class="row-border full-length-header hover table table-bordered cb-data-table" cellspacing="0" width="100%">
						<thead>
							<tr>
								<th width="50%"><%= __("admin.order_assignment.captains");%></th>
								<th><%= __("admin.order_assignment.assignment_date");%></th>
							</tr>
						</thead>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>

<%- contentFor('css') %>
    <link rel="stylesheet" href="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/css/bootstrap-select.css">

<%- contentFor("script") %>
	<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/js/bootstrap-select.js"></script>
	<script type="text/javascript">
		/** Function to initialize datatable and get server side data*/
		var dataTable =	"";
		$(document).ready(function() {
			dataTable = $('#datatable-listing').DataTable({
				"bStateSave"	: true,
				"fnStateSave"	: function (oSettings, oData) {
					localStorage.setItem( 'DataTables', JSON.stringify(oData) );
				},
				"fnStateLoad"	: function (oSettings) {
					return JSON.parse( localStorage.getItem('DataTables') );
				},
				"order"		: 	[],
				"sDom"		:	"ltipr",
				"serverSide": 	true,
				"scrollX"	: 	true,
				"lengthMenu":	PAGING_LENGTH_MENU,
				"columns"	: 	[
					{
						"data"	 	: {},
						"orderable" : false,
						"render"    : function(result){
							var driverList	=	(result.driver_list)	? 	result.driver_list	:[];
							var driverHtml	=	"<%= __('admin.order_assignment.no_driver_available'); %>"

							if(driverList.length >0){
								driverHtml = "";
								driverList.map(records=>{
									let driverId 	=	records._id;
									let driverName 	= 	records.full_name;

									driverHtml += '<a href="<%=WEBSITE_ADMIN_URL%>user_management/view_driver/'+driverId+'" target="_blank">'+driverName+'</a> </br>';
								});
							}
							return driverHtml;
						}
					},
					{ 	"data"		: 'created',
						"orderable" : false,
						"render" 	: function(created){
							return moment(created).tz(DEFAULT_TIME_ZONE).format(DATATABLE_DATE_TIME_FORMAT);
						}
					},
				],
				"ajax":{
					url 	: "<%=admin_list_url%>/<%=order_id%>",
					type	: "POST",
					dataSrc	: function(res){
						return res.data;
					}
				}
			});

			/** Refresh datatable */
			$(".refresh-btn").click(function(e) {
				e.stopPropagation();
				$("#datatable-listing").DataTable().ajax.reload();
			});
		});
	</script>
	<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PATH%>datatable_state_storage.js"></script>
