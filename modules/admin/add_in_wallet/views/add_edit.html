<div class="row clearfix">
	<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
		<form id="add-wallet" action="<%=admin_list_url%>/add" data-submit-btn-id="wallet-add-btn-id" method="post" class="on_click_submit" role="form">
			<div class="modal-dialog  modal-lg" role="document">
				<div class="modal-content">
					<div class="modal-header modal-header-seperator p-l-20 p-b-0">
						<h2 class="modal-title">
							<%=__("admin.add_in_wallet.add_wallet"); %>
						</h2>
					</div>
					<div class="modal-body padding-20">
						<div class="row clearfix">
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="offer_name_in_english" class="control-label">
											<%= __("admin.add_in_wallet.offer_name_in_english"); %><span class="required"> *</span>
										</label>
										<input type="text" id="offer_name_in_english" class="form-control" name="offer_name_in_english" value=""/>
									</div>
									<span id="offer_name_in_english_error" class="error"></span>
								</div>
							</div>
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="offer_name_in_arabic" class="control-label">
											<%= __("admin.add_in_wallet.offer_name_in_arabic"); %><span class="required"> *</span>
										</label>
										<input type="text" id="offer_name_in_arabic" class="form-control" name="offer_name_in_arabic" value=""/>
									</div>
									<span id="offer_name_in_arabic_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="valid_till" class="control-label">
											<%=  __('admin.add_in_wallet.valid_till'); %><span class="required"> *</span>
										</label>
										<input class="form-control" name="valid_till" id="date-range-picker-one" value="">
									</div>
									<input class="form-control hide" id="start_date" type="text" name="start_date" value="">
									<input class="form-control hide" id="end_date" type="text" name="end_date" value="">
									<span id="valid_till_error" class="error"></span>
								</div>
							</div>
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="client_criteria" class="control-label">
											<%= __("admin.add_in_wallet.client_criteria"); %><span class="required"> *</span>
										</label>
										<select class="form-control show-tick" name="client_criteria" id="client_criteria">
											<option value=""><%= __("admin.add_in_wallet.select_client_criteria"); %></option>
											<% Object.keys(CLIENT_CRITERIA).map(key=>{ %>
												<option value="<%=key%>"><%=CLIENT_CRITERIA[key]["status_name"]%></option>
											<% 	}); %>
										</select>
									</div>
									<span id="client_criteria_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="account_criteria" class="control-label">
											<%= __("admin.add_in_wallet.account_criteria"); %><span class="required"> *</span>
										</label>
										<select class="form-control show-tick" name="account_criteria" id="account_criteria">
											<option value=""><%= __("admin.add_in_wallet.select_account_criteria"); %></option>
											<% Object.keys(ACCOUNT_CRITERIA).map(key=>{ %>
												<option value="<%=key%>"><%=ACCOUNT_CRITERIA[key]%></option>
											<% 	}); %>
										</select>
									</div>
									<span id="account_criteria_error" class="error"></span>
								</div>
							</div>
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="account_criteria_amount" class="control-label">
											<%= __("admin.add_in_wallet.account_criteria_amount"); %><span class="required"> *</span>
										</label>
										<input type="text" id="account_criteria_amount" class="form-control" name="account_criteria_amount" value=""/>
									</div>
									<span id="account_criteria_amount_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="order_criteria_type" class="control-label">
											<%= __("admin.add_in_wallet.order_criteria_type"); %><span class="required"> *</span>
										</label>
										<select class="form-control show-tick" name="order_criteria_type" id="order_criteria_type">
											<option value=""><%= __("admin.add_in_wallet.select_order_criteria_type"); %></option>
											<% Object.keys(ORDER_CRITERIA_TYPE).map(key=>{ %>
												<option value="<%=key%>"><%=ORDER_CRITERIA_TYPE[key]%></option>
											<% 	}); %>
										</select>
									</div>
									<span id="order_criteria_type_error" class="error"></span>
								</div>
							</div>
							<div class="col-sm-6 order-amount-class hide">
								<div class="form-group">
									<div class="form-line">
										<label for="order_criteria" class="control-label">
											<%= __("admin.add_in_wallet.order_criteria"); %><span class="required"> *</span>
										</label>
										<select class="form-control show-tick" name="order_criteria" id="order_criteria">
											<option value=""><%= __("admin.add_in_wallet.select_order_criteria"); %></option>
											<% Object.keys(ACCOUNT_CRITERIA).map(key=>{ %>
												<option value="<%=key%>"><%=ACCOUNT_CRITERIA[key]%></option>
											<% 	}); %>
										</select>
									</div>
									<span id="order_criteria_error" class="error"></span>
								</div>
							</div>
							<div class="col-sm-6 order-amount-class hide">
								<div class="form-group">
									<div class="form-line">
										<label for="order_criteria_amount" class="control-label">
											<%= __("admin.add_in_wallet.order_criteria_amount"); %><span class="required"> *</span>
										</label>
										<input type="text" id="order_criteria_amount" class="form-control" name="order_criteria_amount" value=""/>
									</div>
									<span id="order_criteria_amount_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-6 no-of-orders-class hide">
								<div class="form-group">
									<div class="form-line">
										<label for="number_of_orders" class="control-label">
											<%= __("admin.add_in_wallet.number_of_orders"); %><span class="required"> *</span>
										</label>
										<input type="text" id="number_of_orders" class="form-control" name="number_of_orders" value=""/>
									</div>
									<span id="number_of_orders_error" class="error"></span>
								</div>
							</div>
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="amount" class="control-label">
											<%= __("admin.add_in_wallet.amount"); %><span class="required"> *</span>
										</label>
										<input type="text" id="amount" class="form-control" name="amount" value=""/>
									</div>
									<span id="amount_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="offer_code" class="control-label">
											<%= __("admin.add_in_wallet.offer_code"); %><span class="required"> *</span>
										</label>
										<input type="text" id="offer_code" class="form-control" name="offer_code" value="<%=offer_code%>"/>
									</div>
									<span id="offer_code_error" class="error"></span>
								</div>
							</div>
						</div>
					</div>
					<div class="modal-footer modal-footer-seperator">
						<button type="button" id="wallet-add-btn-id" class="btn bg-brown btn-sm waves-effect col-white btn-submit" <%- ADMIN_LOADING_TEXT %> >
							<%= __("admin.system.submit"); %>
						</button>
						<button type="button" class="btn bg-pink btn-sm waves-effect col-white" data-dismiss="modal" aria-hidden="true">
							<%= __("admin.system.cancel"); %>
						</button>
					</div>
				</div>
			</div>
		</form>
	</div>
</div>

<script type="text/javascript">
	/**
	 * Function to submit form
	 */
	$('.btn-submit').click(function(){
		var btnId = $(this).attr('id');
		startTextLoading(btnId);
		ajax_submit('add-wallet',function(status,response){
			if(status){
				$("#reset").trigger("click");
			}else{
				stopTextLoading(btnId);
			}
		});
	});

	/** Refresh bootstrap select box  **/
	$(".show-tick").selectpicker('refresh');

	var datePickerInput    = '#date-range-picker-one';
	var fromDateInput      = '#start_date';
	var toDateInput	       = '#end_date';
	var stopTableDraw 	   = true;
	var minDate			   = new Date();
	$(document).ready(function(){
		initDateRangePicker();

		$("#order_criteria_type").change(function(){
			var type = $(this).val();
			$('.no-of-orders-class').addClass('hide');
			$('.order-amount-class').addClass('hide');
			if(type == '<%=ORDER_CRITERIA_TYPE_ORDER_AMOUNT %>'){
				$('.order-amount-class').removeClass('hide');
			}else if(type == '<%=ORDER_CRITERIA_TYPE_NO_OF_ORDERS%>'){
				$('.no-of-orders-class').removeClass('hide');
			}
		});
	});

</script>
