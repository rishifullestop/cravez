<div class="col-sm-12 autocomplete-input-container">
    <input id="pac-input" class="controls on_click_submit" type="text" placeholder="Search Box" />
    <ul class="autocomplete-pac-results"></ul>
    <div id="address_map" style="height: 350px;"></div>
</div>
<script type="text/javascript">
	let markers = [];
	let map 	= '';
	
	function initMap(){
		var defaultLat = ($("#latitude").val()) ? $("#latitude").val() : 29.396086441;
		var defaultLng = ($("#longitude").val()) ? $("#longitude").val() : 47.52917822;
		
		var myLatlng = new google.maps.LatLng(defaultLat,defaultLng);	
		var myOptions = {
			zoom : 12,
			center		: myLatlng,
			mapTypeId	: google.maps.MapTypeId.ROADMAP
		};
		map = new google.maps.Map(document.getElementById('address_map'), myOptions); console.log(map);
		
		marker	= new google.maps.Marker({
			draggable: true,
			position: myLatlng,
			map: map
		});
		
		google.maps.event.addListener(marker, "dragend", function (event) {
			updateLatLongValues(event.latLng.lat(),event.latLng.lng());			
		});
    	
    	markers.push(marker);
    }
	
	
    function debounce(func, wait, immediate) {
		let timeout;
		return function() {
			let context = this,
			args = arguments;
			let later = function() {
				timeout = null;
				if (!immediate) func.apply(context, args);
			};
			let callNow = immediate && !timeout;
			clearTimeout(timeout);
			timeout = setTimeout(later, wait);
			if (callNow) func.apply(context, args);
		};
	}
    
    function initAutocomplete() {    
		// Create the search box and link it to the UI element.
		let inputContainer = document.querySelector('autocomplete-input-container');
		let sessionToken = new google.maps.places.AutocompleteSessionToken();
		let autocomplete_results = document.querySelector('.autocomplete-results');
		let service = new google.maps.places.AutocompleteService();
      
		let serviceDetails = new google.maps.places.PlacesService(map);
     
		let displaySuggestions = function(predictions, status) {
			if (status != google.maps.places.PlacesServiceStatus.OK) {
				console.log(status);
				return;
			}
			let results_html = [];
			predictions.forEach(function(prediction) {
				results_html.push(`<li class="autocomplete-item pac-item-query" data-type="place" data-place-id=${prediction.place_id}><span class="autocomplete-icon icon-localities pac-icon pac-icon-marker"></span>      			    <span class="autocomplete-text pac-item-query"><b>${prediction.description}</b></span></li>`);
			});
			autocomplete_results.innerHTML = results_html.join("");
			autocomplete_results.style.display = 'block';
			let autocomplete_items = autocomplete_results.querySelectorAll('.autocomplete-item');
			for (let autocomplete_item of autocomplete_items) {
				autocomplete_item.addEventListener('click', function() {
					let prediction = {};
					const selected_text = this.querySelector('.autocomplete-text').textContent;
					const place_id = this.getAttribute('data-place-id');
					let request = {
						placeId: place_id,
						fields: ['name', 'geometry']
					};
    
					serviceDetails.getDetails(request, function(place, status) { 
						if (status == google.maps.places.PlacesServiceStatus.OK) {
							if (!place.geometry) {
								console.log("Returned place contains no geometry");
								return;
							}
							marker.setPosition(place.geometry.location);
							var bounds = new google.maps.LatLngBounds();
							if (place.geometry.viewport) {
								bounds.union(place.geometry.viewport);
							} else {
								bounds.extend(place.geometry.location);
							}
							console.log(map);
							map.fitBounds(bounds);
						}
						autocomplete_input.value = selected_text;
						autocomplete_results.style.display = 'none';
						$('#pac-input').val(selected_text);
						$('#latitude').attr('value',place.geometry.location.lat());
						$('#longitude').attr('value',place.geometry.location.lng());
					});
				})
			}
		};
		let autocomplete_input = document.getElementById('venue');
		autocomplete_input.addEventListener('input', debounce(function() {  
			let value = this.value;
			if (value.length > 2) {
				value.replace('"', '\\"').replace(/^\s+|\s+$/g, '');
				if (value !== "") {
					service.getPlacePredictions({
						input: value,
						sessionToken: sessionToken,
						componentRestrictions: {country: 'KW'},
					}, displaySuggestions);
				} else {
					autocomplete_results.innerHTML = '';
					autocomplete_results.style.display = 'none';
				}
			}
		}, 150));
    }

    $(document).ready(function(){ 
		initMap();
    	initAutocomplete();
    	initPacAutocomplete();
    });
    
    $(document).on("keyup",".coordinates",function(){	
		var lat		= $("#latitude").val();
		var lng		= $("#longitude").val();
		var tmpLat	= (lat) ? parseFloat(lat) : 0;
		var tmpLng	= (lng) ? parseFloat(lng) : 0;
		
		if(tmpLat&& tmpLng){
			var latlng = new google.maps.LatLng(tmpLat,tmpLng);
			map.setCenter(latlng)
			marker.setPosition(latlng);
		}
	});
</script>
