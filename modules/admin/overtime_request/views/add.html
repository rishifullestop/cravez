<div class="row clearfix">
	<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
		<form id="add-overtime-request" action="<%= admin_list_url+'/add' %>" data-submit-btn-id="overtime-request-add-btn-id" method="post" class="on_click_submit" role="form">
			<div class="modal-dialog modal-lg"  role="document">
				<div class="modal-content">
					<div class="modal-header modal-header-seperator p-l-20 p-b-0">
						<h2 class="modal-title">
							<%= __("admin.overtime_request.add_overtime_request"); %>
						</h2>
					</div>
					<div class="modal-body padding-20">
						<div class="row clearfix selected">
							<div class="col-sm-12">
								<div class="form-group">
									<div class="form-line">
										<label for="team_member" class="control-label">
											<%=  __('admin.overtime_request.team_member'); %><span class="required"> *</span>
										</label>
										<select id="team_member" class="form-control show-tick" name="agent_id"  data-live-search="true">
											<option value=""><%- __('admin.overtime_request.select_team_member')%></option>
											<%-users_list%>
										</select>
									</div>
									<span id="agent_id_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="request_date" class="control-label">
											<%=  __('admin.overtime_request.request_date'); %><span class="required"> *</span>
										</label>
										<input class="form-control" name="request_date" id="request_date" value="<%= newDate('',DATABASE_DATE_FORMAT) %>" readonly>
									</div>
									<span id="request_date_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-6">
								<div class="form-group">
									<div class="form-line">
										<label for="start_time" class="control-label"><%= __('admin.overtime_request.overtime_start_time'); %><span class="required"> * </span> </label>
										<input name="start_time"  id="start_time" autocomplete="off" class="form-control timepicker"/>
									</div>
									<span id="start_time_error" class="error"></span>
								</div>
							</div>
							<div class="col-sm-6">
								<div class="form-group demo-tagsinput-area">
									<div class="form-line">
										<label for="end_time" class="control-label"><%= __('admin.overtime_request.overtime_end_time'); %><span class="required "> *</span> </label>
										<input  name="end_time" id="end_time" autocomplete="off" type="text" class=" timepicker form-control"/>
									</div>
									<span id="end_time_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-12">
								<div class="form-group">
									<div class="form-line">
										<label for="overtime_purpose" class="control-label">
											<%=  __('admin.overtime_request.overtime_purpose'); %><span class="required"> *</span>
										</label>
										<textarea class="form-control resize-none" id="overtime_purpose" name="overtime_purpose" rows="4" ></textarea>
									</div>
									<span id="overtime_purpose_error" class="error"></span>
								</div>
							</div>
						</div>
					</div>
					<div class="modal-footer modal-footer-seperator">
						<button type="button" id="overtime-request-add-btn-id" class="btn bg-brown btn-sm waves-effect col-white btn-submit" <%- ADMIN_LOADING_TEXT %> >
							<%= __("admin.system.submit"); %>
						</button>
						<button type="button" class="btn bg-blue-grey btn-sm waves-effect col-white" data-dismiss="modal" aria-hidden="true">
							<%= __("admin.system.cancel"); %>
						</button>
					</div>
				</div>
			</div>
		</form>
	</div>
</div>

<script type="text/javascript">
	/**
	 * Function to submit form
	 */
	$('.btn-submit').click(function(){
		var btnId = $(this).attr('id');
		startTextLoading(btnId);
		ajax_submit('add-overtime-request',function(status,response){
			if(status){
				window.location.href = response.redirect_url;
			}else{
				stopTextLoading(btnId);
			}
		});
	});

	/* date time picker function*/
	$('.timepicker').datetimepicker({
		format: '<%=DATEPICKER_TIME_FORMAT%>',
	});

	$(document).ready(function() {
	  $(".show-tick").selectpicker('refresh');
	});
</script>
