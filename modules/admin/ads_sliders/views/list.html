<div class="container-fluid" id="main-container">
	<!--Search Start -->
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="panel-group" id="panel-group-id" role="tablist" aria-multiselectable="true">
				<div class="panel panel-col-pink">
					<div class="panel-heading" role="tab" id="panel-heading-id">
						<h4 class="panel-title">
							<a role="button" data-toggle="collapse" data-target="#panel-collapse-id" data-parent="#panel-group-id" href="javascript:void(0)" aria-expanded="false"
							   aria-controls="panel-collapse-id">
								<%= __("admin.system.search"); %>
								<span class="pull-right collapse-toggle-icon"></span>
							</a>
						</h4>
					</div>
					<div id="panel-collapse-id" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="panel-heading-id">
						<div class="panel-body">
							<form id="searchForm" name="searchForm" >
								<div class="row clearfix dataTables_wrapper">
									<!-- Search by position -->
									<div class="col-xs-4">
										<div class="form-group">
											<div class="form-line">
												<select class="form-control show-tick status_search" id="column_filter_0" onchange="searchDatatable(0)"
													name="search_by_position">
													<option value=""><%=__("admin.ads_sliders.search_by_position");%>
													</option>
													<%	if(ADS_POSITION && Object.keys(ADS_POSITION).length > 0){
									                    Object.keys(ADS_POSITION).map(searchStatus=>{ %>
															<option value="<%=searchStatus%>">
																<%=(ADS_POSITION[searchStatus]) ? ADS_POSITION[searchStatus] :"";%>
															</option>
														<%});
									                }%>
												</select>
											</div>
										</div>
									</div>
									<div class="col-md-2">
										<button type="button" id="reset" class="btn btn-sm waves-effect btn-danger">
											<%= __("admin.system.reset")%>
										</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!--Search End -->

	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="header">
					<h2>
						<%= __("admin.ads_sliders.ads_sliders");%>
					</h2>
					<%if(count != 4){%>
					<ul class="header-dropdown m-r--5 btn-right-top-margin">
						<li>
							<a href="<%=admin_list_url%>/add" class=' <%= getPermissionClass(module_type,["ads_sliders","add"]); %>'>
								<button type="button" class="btn bg-indigo waves-effect btn-sm">
									<%= __("admin.system.add") %>
								</button>
							</a>
						</li>
					</ul>
					<%}%>
				</div>
				<div class="body hideScroll">
					<table id="datatable-listing" class="row-border full-length-header hover table table-bordered cb-data-table" cellspacing="0" width="100%">
						<thead>
							<tr>
								<th width="30%"><%= __("admin.ads_sliders.position");%></th>
								<th width="30%"><%= __("admin.system.modified"); %></th>
								<th width="30%"><%= __("admin.system.action"); %></th>
							</tr>
						</thead>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>

<%- contentFor('css') %>
<link href="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/css/bootstrap-select.css" rel="stylesheet">

<%- contentFor("script") %>
<script src="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/js/bootstrap-select.js" type="text/javascript"></script>
<script type="text/javascript">
	/** Function to initialize datatable and get server side data*/
	var dataTable		=	"";
	/** set variable for daterangepicker */
	$(document).ready(function() {
		dataTable = $('#datatable-listing').DataTable({
			"bStateSave"	: true,
			"fnStateSave"	: function (oSettings, oData) {
				localStorage.setItem( 'DataTables', JSON.stringify(oData) );
			},
			"fnStateLoad"	: function (oSettings) {
				return JSON.parse( localStorage.getItem('DataTables') );
			},
			"order"		: 	[[1, "desc"]],
			"sDom"		:	"ltipr",
			"serverSide": 	true,
			"scrollX"	: 	true,
			"lengthMenu":	PAGING_LENGTH_MENU,
			"columns"	: 	[
				{
					"data"		 : 'position',
					"field_type": "<%= NUMERIC_FIELD %>",
				 	"render": function (position) {
						return (position)? 'Position '+ position:"";
					}
				},				
				{
					"data"   : 'modified',
					"render" : function(modified){
						return moment(modified).tz(DEFAULT_TIME_ZONE).format(DATATABLE_DATE_TIME_FORMAT);
					}
				},
				{
					"data"		 : {},
					"orderable"	 : false,
					"searchable" : false,
					"render" 	 : function(result){
						var id  	= (result._id  ) ? result._id : "";
						var dropDownButton 		=	''+
						'<div class="btn-group">'+
							'<button type="button" class="btn btn-primary dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="true">'+
								'<%= __("admin.system.action"); %> '+
								'<span class="caret"></span>'+
							'</button>'+
							'<ul class="dropdown-menu  width-180">'+
								/** Edit Link **/
								'<li>'+
									'<a href="<%=admin_list_url%>/edit/' + id +'" class="waves-effect waves-block <%= getPermissionClass(module_type,["ads_sliders","edit"]); %>">'+
										' <%= __("admin.system.edit"); %>'+
									'</a>'+
								'</li>'+
								'<li>' +
									'<a href="javascript:void(0)" data-href="<%=admin_list_url%>/delete/' + id + '" class="confirm_box waves-effect waves-block <%= getPermissionClass(module_type,["ads_sliders","delete"]); %>"  data-confirm-message="<%= __("admin.ads_sliders.do_you_want_to_delete_this_ads"); %>" data-confirm-heading="<%= __("admin.system.are_you_sure") %>">' +
										' <%= __("admin.system.delete"); %>' +
									'</a>' +
								'</li>' +
							'</ul>'+
						'</div>';
						return dropDownButton;
					}
				}
			],

			"ajax":{
				url 	:	"<%=admin_list_url%>",
				type	: 	"POST",
				dataSrc	: 	function(res){
					adjustPermissionsClass();
					return res.data;
				}
			},
		});
	});

	/** Javascript function to search datatable */
	function searchDatatable(columnNumber){
		var query= $('#column_filter_'+columnNumber).val();
		dataTable.column(columnNumber).search(query).draw()
	}//end searchDatatable()
</script>
<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PATH%>datatable_state_storage.js"></script>
