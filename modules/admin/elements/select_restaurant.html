<div class="row clearfix">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
            <div class="panel-group" id="restaurant-panel-id" role="tablist" aria-multiselectable="true">
                <form id="searchDataForm" name="searchDataForm" >
                    <div class="panel panel-col-pink">
                        <div class="panel-heading" role="tab" id="restaurant-heading-id">
                            <h4 class="panel-title">
                                <a role="button" data-toggle="collapse" data-target="#restaurant-collapse-id" data-parent="#restaurant-panel-id" href="javascript:void(0)" aria-expanded="false"
                                    aria-controls="restaurant-collapse-id">
                                   <%= __("admin.system.select_restaurant"); %>
                                    <span class="pull-right collapse-toggle-icon"></span>
                                </a>
                            </h4>
                        </div>
                        <div id="restaurant-collapse-id" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="restaurant-heading-id">
                            <div class="panel-body">
                                <div class="row clearfix dataTables_wrapper">
                                    <!-- Search by Restaurant -->
                                    <div class="col-xs-12 col-sm-6">
                                        <div class="form-group">
                                            <div class="form-line">
                                                <select class="form-control show-tick" name="restaurant_slug" id="restaurant_slug" data-live-search="true">
                                                    <option value=""><%= __("admin.system.select_restaurant"); %></option>
                                                    <%-restaurantList%>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-xs-12 col-sm-2">
                                        <button type="button" id="reset-search-data" class="btn btn-sm waves-effect btn-danger">
                                            <%= __("admin.system.reset")%>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="row clearfix">
        <div class="col-xs-12 col-sm-12 text-right m-b-20">
            <button type="button" id="load-menu" class="btn btn-sm waves-effect btn-success action-btn" onclick="refreshContent()" data-type="menu">
                <%= __("admin.system.restaurant_menu")%>
            </button>
        </div>
    </div>
    <script type="text/javascript">
        var refreshContent = "";
        var admin_list_url = "<%= admin_list_url %>";
        refreshContent = function(){
            var restaurantSlug  = $("#restaurant_slug").val();
            var contentSlug     = $(".action-btn").data("type");
            if(restaurantSlug){
                window.history.replaceState(null, null, admin_list_url+"/"+restaurantSlug+"/"+contentSlug);
                var options = {
                    url 	: "<%= admin_list_url %>/"+restaurantSlug+"/"+contentSlug+"/restaurant_menu",
                    method	: "GET"
                };
                alert("<%= admin_list_url %>/"+restaurantSlug+"/"+contentSlug+"/restaurant_menu");
                ajaxRequest(options,function(response){
                    $("#main-container").html(response);
                });
            }else{
                window.history.replaceState(null, null, admin_list_url+"/"+restaurantSlug+"/"+contentSlug);
                $("#main-container").html("");
            }
        }
        $(document).ready(function(){
            // refreshContent();
        });
    </script>
