<%
	var statusType = (typeof status_type !== typeof undefined && status_type)	?	status_type :"";
%>
<div class="container-fluid">
	<!--Search Start -->
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="panel-group" id="panel-group-id" role="tablist" aria-multiselectable="true">
				<div class="panel panel-col-pink">
					<div class="panel-heading" role="tab" id="panel-heading-id">
						<h4 class="panel-title">
							<a role="button" data-toggle="collapse" data-target="#panel-collapse-id" data-parent="#panel-group-id" href="javascript:void(0);" aria-expanded="false"
							   aria-controls="panel-collapse-id">
								 <%= __('admin.system.search'); %>
								<span class="pull-right collapse-toggle-icon"></span>
							</a>
						</h4>
					</div>
					<div id="panel-collapse-id" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="panel-heading-id">
						<div class="panel-body">
							<div class="row clearfix dataTables_wrapper">
								<div class="col-md-6">
									<div class="form-group">
										<div class="form-line">
											<input class="form-control" id="column_filter_0" onkeyup="searchDatatable(0);"  placeholder="<%=__('Search By Text Group');%>">
										</div>
									</div>
								</div>
								<!-- Search by Text type -->
								<div class="col-md-6">
									<div class="form-group">
										<div class="form-line">
											<select class="form-control search_by_status" id="status_search" name="status">
												<option value=""><%=__("Search By Text Type");%></option>
												<%
												if(typeof TEXT_SEARCH_DROPDOWN!== typeof undefined && TEXT_SEARCH_DROPDOWN.length > 0){
													TEXT_SEARCH_DROPDOWN.map(searchStatus=>{ %>
														<option value="<%=searchStatus.status_id%>" ><%=searchStatus.status_name%></option>
												<% 	});
												} %>
											</select>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!--Search End -->
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="header">
					<h2>
						<%=__("Text Group Setting");%>
					</h2>
					<ul class="header-dropdown m-r--5 btn-right-top-margin">
						<li>
							<select class="export-details form-control border-bottom">
								<option value=""><%= __("Select Export Type"); %></option>
								<option value="<%=EXPORT_ALL%>"><%= __("Export All"); %></option>
							</select>
						</li>
						<li>
							<a href="<%=admin_list_url+'/importData'%>" ><button type="button" class="btn bg-indigo waves-effect"><%= __("Import");%></button></a>
						</li>
						<li>
							<a href="<%=admin_list_url+'/export_to_json'%>" ><button type="button" class="btn bg-indigo waves-effect"><%= __("Export To Json");%></button></a>
						</li>
					</ul>
				</div>
				<div class="body table-responsive">
					<table id="datatable-listing" class="row-border hover table table-bordered cb-data-table" cellspacing="0" width="100%">
						<thead>
							<tr>
								<th width="40%"><%=__("Text Group");%></th>
								<th width="40%"><%=__("Count");%></th>
								<th width="20%"><%= __('admin.system.action'); %></th>
							</tr>
						</thead>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>
<%- contentFor("script") %>
<script type="text/javascript">
	/** Function to initialize datatable and get server side data*/
	var dataTable ="";
	$(document).ready(function() { 		
		dataTable 	= 	$('#datatable-listing').DataTable({
			"order"		:	[[ 0, "desc" ]],
			"serverSide": 	true,
			"sDom"		:	"ltipr",
            "columns"	: 	[
	            { "data": '_id' },
	            { "data": 'count' },
	            {
	                "data"			: 	'_id',
	                "orderable"		:   false,
	                "searchable"	: 	false,
	                "render" 		: 	function(id){
						var action = '<a href="<%=admin_list_url%>/'+id+'/view" class="btn  ml-5 m-t-5 bg-teal btn-sm waves-effect"><%= __("admin.system.view"); %></a>'
						action += '<a href="javascript:void(0);" data-href="<%=admin_list_url%>/delete/'+id+'" class="btn bg-red ml-5 m-t-5 btn-sm waves-effect confirm_box"data-confirm-message="<%= __("admin.text_group_setting.you_want_to_delete_this_text_group_setting"); %>" data-confirm-heading="<%= __("admin.system.are_you_sure") %>"><%= __("admin.system.delete"); %></a>';
						action += '<a href="<%=admin_list_url%>/export/'+id+'" class="btn bg-blue ml-5 m-t-5 btn-sm waves-effect"><%= __("Export"); %></a>';
						return action;
	                }
	            }
	        ],
			"ajax":{
				url 	:	"<%=admin_list_url+"/"+statusType%>",
				type	: "POST",
				data	: 	function (d) {
					d.status_search	= 	$('#status_search').val();
				},
				dataSrc	: function(res){
					return res.data;
				}
			}
		});
	});
	
	/**
	* Export Details action
	*
	* @param  null
	*
	* @return void
	*/
	$(document).on("change",".export-details",function(){
		var value = $(this).val(); 
		if(value && value!="" && typeof value!== typeof undefined){
			window.location.href = '<%=admin_list_url+"/export_data/"%>'+value;
		}
	});

	/**
	* Search by text type
	*
	* @param  null
	*
	* @return void
	*/
	$(".search_by_status").change(function(){
		dataTable.draw();
	});

	/** Javascript function to search datatable */
	function searchDatatable(columnNumber){
		var query= $('#column_filter_'+columnNumber).val();
		dataTable.column(columnNumber).search(query).draw()
	}//end searchDatatable()
</script>
