<div class="container-fluid" id="main-container">
	<!--Search Start -->
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="panel-group" id="panel-group-id" role="tablist" aria-multiselectable="true">
				<div class="panel panel-col-pink">
					<div class="panel-heading" role="tab" id="panel-heading-id">
						<h4 class="panel-title">
							<a role="button" data-toggle="collapse" data-target="#panel-collapse-id" data-parent="#panel-group-id" href="javascript:void(0)" aria-expanded="false"
							   aria-controls="panel-collapse-id">
								<%= __("admin.system.search"); %>
								<span class="pull-right collapse-toggle-icon"></span>
							</a>
						</h4>
					</div>
					<div id="panel-collapse-id" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="panel-heading-id">
						<div class="panel-body">
							<form id="searchForm" name="searchForm" >
								<div class="row clearfix dataTables_wrapper">
									<!-- Search by restaurant name -->
									<div class="col-xs-12 col-sm-4">
										<div class="form-group">
											<div class="form-line">
												<select class="form-control show-tick restaurant_id" name="search_restaurant_id" id="restaurant_ids"
													data-live-search="true" data-title="<%= __('admin.report.search_by_restaurant_name'); %>">

													<%-restaurant_list%>
												</select>
											</div>
										</div>
									</div>
									<!-- Search by branch -->
									<div class="col-xs-12 col-sm-4">
										<div class="form-group">
											<div class="form-line">
												<select class="form-control show-tick branch_id disabled" id="branch_ids" name="search_branch_id"
													data-live-search="true" data-title="<%=__('admin.report.search_by_branch')%>" disabled multiple>

												</select>
											</div>
										</div>
									</div>
									<!-- reset button -->
									<div class="col-sm-2">
										<button type="button" id="reset" class="btn btn-sm waves-effect btn-danger">
											<%= __("admin.system.reset")%>
										</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!--Search End -->

	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="header">
					<h2>
						<%=  __("admin.report.restaurant_performance_half_yearly_report"); %>
					</h2>
					<ul class="header-dropdown m-r--5 btn-right-top-margin  visible-md visible-lg visible-sm <%= getPermissionClass(module_type,['restaurant_performance_half_yearly_report','export']); %>">
						<li>
							 <a href="javascript:void(0);" id="dataExportBtn">
								<button type="button" class="btn btn-sm bg-green waves-effect">
									<%= __("admin.report.export")%>
								</button>
							</a>
						</li>
					</ul>
				</div>
                <div class="body">
                    <table id="datatable-listing" class="row-border full-length-header hover table table-bordered cb-data-table"
                        cellspacing="0" width="100%">
                    </table>
                </div>
			</div>
		</div>
	</div>
</div>

<%- contentFor('css') %>
	<link rel="stylesheet" href="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/css/bootstrap-select.css">
<%- contentFor('script') %>
	<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/js/bootstrap-select.js"></script>
	<script type="text/javascript">
		/** Function to initialize datatable and get server side data*/
		var dataTable = "";
		$(document).ready(function () {
			getData();
		});

        function getData(){
            $.ajax({
                url: "<%=admin_list_url%>/restaurant_performance_half_yearly_report",
                type: "POST",
                data: {
                   	restaurant_ids  : $('#restaurant_ids').val(),
					branch_ids 	    : $('#branch_ids').val(),
                },
                success: function (d) {
                    dataTable = $("#datatable-listing").DataTable({
                        "dom"		: 'Blrtip',
                        "ordering"	: false,
                        "data"		: d.data,
                        "columns"	: d.columns,
                    });
                }
            });
        }

		$("#restaurant_ids,#branch_ids").change(function(){
			if ($.fn.dataTable.isDataTable('#datatable-listing')) {
                dataTable.destroy();
                $('#datatable-listing').empty();
                getData();
            } else {
                $('#datatable-listing').empty();
                getData();
            }
		});

		/** Javascript function to search datatable */
		function searchDatatable(columnNumber){
			var query= $('#column_filter_'+columnNumber).val();
			dataTable.column(columnNumber).search(query).draw()
		}//end searchDatatable()

		/**
		* Export Details action
		*
		* @param  null
		*
		* @return void
		*/
		$(document).on("click","#dataExportBtn",function(){
			var restaurantIds	= $("#restaurant_ids").val();
			var branchIds   	= $("#branch_ids").val();

			if(restaurantIds){
				var exportURL = "<%=admin_list_url%>/restaurant_performance_half_yearly_report/export_data?restaurant_ids=" + restaurantIds;
                if (branchIds) exportURL += "&branch_ids=" + branchIds;
				window.location.href=exportURL;
			}
		});

		/**
		* Get branch list
		*/
		$("select[name='search_restaurant_id']").change(function(){
			getBranchDropDownList($(this));
		});

		/**
		* Get dropdown value by local storage
		*/
		let tempRestaurantId 	= 	"";
		let tempBranchId 	 	=	"";
		if(localStorage["search_" +window.location.pathname]){

			let searchFormData = JSON.parse(localStorage["search_" +window.location.pathname]);
			for(index in searchFormData){
				if(searchFormData[index].name && searchFormData[index].name == "search_branch_id" && searchFormData[index].value){
					tempBranchId = searchFormData[index].value;
				}
				if(searchFormData[index].name && searchFormData[index].name == "search_restaurant_id" && searchFormData[index].value){
					tempRestaurantId = searchFormData[index].value;
				}
			}
			if(tempRestaurantId) getBranchDropDownList($("select[name='search_restaurant_id']"),tempRestaurantId,tempBranchId);
		}

		/**
		* Get branch search dropdown list
		*/
		function getBranchDropDownList(currentObj,restaurantId,branchId){
			if(currentObj){
				var currentValue	=	currentObj.val();
				var childInputName	=	"search_branch_id";
				var childObj		=	(childInputName) ?  $("select[name='"+childInputName+"']") :"";

				if(!currentValue && restaurantId) currentValue = restaurantId;

				childObj.attr("disabled",true).addClass("disabled").html("");
				$(".show-tick").selectpicker('refresh');

				if(currentValue){
					/** Get dropdown list **/
					var options = {
						url 	: "<%=admin_list_url%>/restaurant_branch_dropdown",
						data	: {restaurant_ids : currentValue},
						method	: "post"
					}
					ajaxRequest(options,function(response){
						if(response.status == "<%=STATUS_SUCCESS%>"){
							/** Append dropdown list **/
							childObj.attr("disabled",false).removeClass("disabled").html(response.branch_list);
							if(branchId) childObj.val(branchId);
							$(".show-tick").selectpicker('refresh');
						}else if(response.status && response.message){
							notice(response.status,response.message);
						}
					});
				}
			}
		}// end getBranchDropDownList()

</script>
<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PATH%>datatable_state_storage.js"></script>
