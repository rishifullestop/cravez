<div class="container-fluid" id="main-container">
	<!--Search Start -->
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="panel-group" id="panel-group-id" role="tablist" aria-multiselectable="true">
				<div class="panel panel-col-pink">
					<div class="panel-heading" role="tab" id="panel-heading-id">
						<h4 class="panel-title">
							<a role="button" data-toggle="collapse" data-target="#panel-collapse-id" data-parent="#panel-group-id" href="javascript:void(0)" aria-expanded="false"
							   aria-controls="panel-collapse-id">
								<%= __("admin.system.search"); %>
								<span class="pull-right collapse-toggle-icon"></span>
							</a>
						</h4>
					</div>
					<div id="panel-collapse-id" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="panel-heading-id">
						<div class="panel-body">
							<form id="searchForm" name="searchForm" >
								<div class="row clearfix dataTables_wrapper">
                                    <!-- Search by report type -->
                                    <div class="col-xs-12 col-sm-4">
                                        <div class="form-group">
                                            <div class="form-line">
                                                <select class="form-control show-tick type" id="type" name="type">
                                                    <% if(AREAS_CONTRIBUTION_REPORT_TYPE && Object.keys(AREAS_CONTRIBUTION_REPORT_TYPE).length> 0){
                                                        Object.keys(AREAS_CONTRIBUTION_REPORT_TYPE).map(type=>{ %>
                                                        <option value=<%=type%>>
                                                            <%=(AREAS_CONTRIBUTION_REPORT_TYPE[type]) ? AREAS_CONTRIBUTION_REPORT_TYPE[type] :"";%>
                                                        </option>
                                                        <%}); }%>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Search by cities -->
                                    <div class="col-xs-12 col-sm-4">
                                        <div class="form-group">
                                            <div class="form-line">
                                                <select class="form-control show-tick city_id" id="city_ids" name="search_city_id" data-live-search="true" data-title="<%= __('admin.report.search_by_city'); %>"
                                                    >
                                                    <%- city_list %>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
									<!-- Search by year -->
									<div class="col-xs-12 col-sm-4">
										<div class="form-group">
											<div class="form-line">
												<select class="form-control show-tick" id="graph_year" name="graph_year">

												</select>
											</div>
										</div>
									</div>
									<!-- Search by year type -->
									<div class="col-xs-12 col-sm-4">
										<div class="form-group">
											<div class="form-line">
												<select class="form-control show-tick type" id="year_type" name="year_type">
													<% if(YEAR_TYPE && Object.keys(YEAR_TYPE).length> 0){
														Object.keys(YEAR_TYPE).map(year_type=>{ %>
														<option value=<%=year_type%>>
															<%=(YEAR_TYPE[year_type]) ? YEAR_TYPE[year_type] :"";%>
														</option>
														<%}); }%>
												</select>
											</div>
										</div>
									</div>
									<!-- reset button -->
									<div class="col-sm-2">
										<button type="button" id="reset" class="btn btn-sm waves-effect btn-danger">
											<%= __("admin.system.reset")%>
										</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!--Search End -->

	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="header">
					<h2>
						<%=  __("admin.report.areas_contribution_report"); %>
					</h2>
					<ul class="header-dropdown m-r--5 btn-right-top-margin  visible-md visible-lg visible-sm <%= getPermissionClass(module_type,['areas_contribution_report','export']); %>">
						<li>
							 <a href="javascript:void(0);" id="dataExportBtn">
								<button type="button" class="btn btn-sm bg-green waves-effect">
									<%= __("admin.report.export")%>
								</button>
							</a>
						</li>
					</ul>
				</div>
				<div class="body">
					<table id="datatable-listing" class="row-border full-length-header hover table table-bordered cb-data-table" cellspacing="0" width="100%">
					<tfoot>
						<tr>
							<th class="sales_th">
								<%= __("admin.report.grand_total"); %>
							</th>
							<th class="sales_th"></th>
							<th class="sales_th"></th>
							<th class="sales_th"></th>
							<th class="sales_th"></th>
							<th class="sales_th"></th>
							<th class="sales_th"></th>
							<th class="sales_th"></th>
							<th class="sales_th"></th>
						</tr>
					</tfoot>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>

<%- contentFor('css') %>
	<link rel="stylesheet" href="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/css/bootstrap-select.css">
<%- contentFor('script') %>
	<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/js/bootstrap-select.js"></script>
	<script type="text/javascript">
		/** Function to initialize datatable and get server side data*/
		var dataTable = "";
		var REPORT_CHART_MONTH_NAMES = <%-JSON.stringify(REPORT_CHART_MONTH_NAMES) %>;
		$(document).ready(function() {
           getData();
        });

        var dateRanges = null;
	    function getData(){
            $.ajax({
                url: "<%=admin_list_url%>/areas_contribution_report",
                type: "POST",
                data: {
                    year : $('#graph_year').val(),
                    year_type :$('#year_type').val(),
                    city_ids: $('#city_ids').val(),
                    type: $('#type').val(),
                },
                success: function (d) {
                    dataTable = $("#datatable-listing").DataTable({
                        "dom"		: 'Blrtip',
                        "ordering"	: false,
                        "data"		: d.data,
						"columns"	: d.columns,
						"scrollX"	: 	true,
						"footerCallback": function (row, data, start, end, display) {
							var api = this.api(), data;

							// Remove the formatting to get integer data for summation
							var intVal = function (i) {
								return typeof i === 'string' ?
									i.replace("KD", '').replaceAll(" ",'').replaceAll(',',"") * 1 :
									typeof i === 'number' ?
										i : 0;
							};

							// Total over this page
							col1 = api
								.column("1", { page: 'current' })
								.data()
								.reduce(function (a, b) {
									return intVal(a) + intVal(b);
								}, 0);

							// Total over this page
							col2 = api
								.column("2", { page: 'current' })
								.data()
								.reduce(function (a, b) {
									return intVal(a) + intVal(b);
								}, 0);
							// Total over this page

							col3 = api
								.column("3", { page: 'current' })
								.data()
								.reduce(function (a, b) {
									return intVal(a) + intVal(b);
								}, 0);
							// Total over this page
							col4 = api
								.column("4", { page: 'current' })
								.data()
								.reduce(function (a, b) {
									return intVal(a) + intVal(b);
								}, 0);
							// Total over this page
							col5 = api
								.column("5", { page: 'current' })
								.data()
								.reduce(function (a, b) {
									return intVal(a) + intVal(b);
								}, 0);
							col6 = api
								.column("6", { page: 'current' })
								.data()
								.reduce(function (a, b) {
									return intVal(a) + intVal(b);
								}, 0);

							col7 = api
								.column("7", { page: 'current' })
								.data()
								.reduce(function (a, b) {
									return intVal(a) + intVal(b);
								}, 0);
							col8 = api
								.column("8", { page: 'current' })
								.data()
								.reduce(function (a, b) {
									return intVal(a) + intVal(b);
								}, 0);

							// Update footer
							$(api.column("1").footer()).html(
								($('#type').val()!='<%=NO_OF_ORDERS%>')? currencyFormat(col1) :col1
							);
							// Update footer
							$(api.column("2").footer()).html(
								($('#type').val() != '<%=NO_OF_ORDERS%>') ? currencyFormat(col2) : col2
							);
							// Update footer
							$(api.column("3").footer()).html(
								($('#type').val() != '<%=NO_OF_ORDERS%>') ? currencyFormat(col3) : col3
							);
							// Update footer
							$(api.column("4").footer()).html(
								($('#type').val() != '<%=NO_OF_ORDERS%>') ? currencyFormat(col4) : col4
							);
							// Update footer
							$(api.column("5").footer()).html(
								($('#type').val() != '<%=NO_OF_ORDERS%>') ? currencyFormat(col5) : col5
							);
							$(api.column("6").footer()).html(
								($('#type').val() != '<%=NO_OF_ORDERS%>') ? currencyFormat(col6) : col6
							);
							$(api.column("7").footer()).html(
								($('#type').val() != '<%=NO_OF_ORDERS%>') ? currencyFormat(col7) : col7
							);
							$(api.column("8").footer()).html(
								($('#type').val() != '<%=NO_OF_ORDERS%>') ? currencyFormat(col8) : customRound(col8)
							);

						},
                    });
                }
            });
        }
		$("#city_ids,#type,#graph_year,#year_type").change(function () {
            if ($.fn.dataTable.isDataTable('#datatable-listing')) {
                 dataTable.destroy();
                 $('#datatable-listing').empty();
				 $('#datatable-listing').html('<tfoot><tr><th class="sales_th"><%= __("admin.report.grand_total"); %></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th></tr ></tfoot >')
                 getData();
            } else {
                 $('#datatable-listing').empty();
				 $('#datatable-listing').html('<tfoot><tr><th class="sales_th"><%= __("admin.report.grand_total"); %></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th><th class="sales_th"></th></tr ></tfoot >')
                 getData();
            }
        });

		/** Javascript function to search datatable */
		function searchDatatable(columnNumber){
			var query= $('#column_filter_'+columnNumber).val();
			dataTable.column(columnNumber).search(query).draw()
		}//end searchDatatable()

		/**
		* Export Details action
		*
		* @param  null
		*
		* @return void
		*/
		$(document).on("click","#dataExportBtn",function(){
			var yearType 		= $("#year_type").val();
			var year   			= $("#graph_year").val();
			var cityIds	        = $("#city_ids").val();
            var type            = $('#type').val();
			if(year && yearType){
				var exportURL = "<%=admin_list_url%>/areas_contribution_report/export_data?year_type=" + yearType + "&year=" + year;
				if(cityIds) exportURL += "&city_ids="+ cityIds;
                if (type) exportURL += "&type=" + type;
				window.location.href=exportURL;
			}
		});

		var MIN_YEAR_FOR_REPORT = parseInt("<%=MIN_YEAR_FOR_REPORT%>");
		function getYearDropdown(){
			var currentYear = new Date().getFullYear();
			var yearsOption = "";
			for(yearValue=currentYear; yearValue >= MIN_YEAR_FOR_REPORT; yearValue--){
				yearsOption = '<option value="'+yearValue+'">'+yearValue+'</option>';
				$("#graph_year").append(yearsOption);
				$("#graph_year").selectpicker("refresh");

			}
		};
		getYearDropdown();
</script>
<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PATH%>datatable_state_storage.js"></script>
