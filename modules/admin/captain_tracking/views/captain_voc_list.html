<div class="row clearfix">
	<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
		<div class="modal-dialog  modal-lg" role="document">
			<div class="modal-content">
				<div class="modal-header modal-header-seperator p-l-20 p-b-0">
					<h2 class="modal-title">
						<%= __("admin.captain_tracking.voc"); %>
					</h2>
				</div>
				<div class="modal-body padding-20">
					<div class="body">
						<table id="datatable-listing-voc" class="row-border hover table table-bordered cb-data-table full-length-header" cellspacing="0" width="100%">
							<thead>
								<tr>
									<th><%= __("admin.captain_tracking.role"); %></th>
									<th><%= __("admin.captain_tracking.type"); %></th>
									<th><%= __("admin.captain_tracking.question"); %></th>
									<th><%= __("admin.captain_tracking.answer"); %></th>
									<th><%= __("admin.system.created"); %></th>
								</tr>
							</thead>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
<script type="text/javascript">
	/** Function to initialize datatable and get server side data*/
	var vocDataTable	  	 = "";
	var VOC_TYPE_FOR_CLIENT  = <%-JSON.stringify(VOC_TYPE_FOR_CLIENT)%>;
	var VOC_TYPE_FOR_CAPTAIN = <%-JSON.stringify(VOC_TYPE_FOR_CAPTAIN)%>;
	var VOC_FOR 			 = <%-JSON.stringify(VOC_FOR)%>;
	$(document).ready(function() {
		vocDataTable = $('#datatable-listing-voc').DataTable({
			"order"		: 	[],
			"sDom"		:	"ltipr",
			"serverSide": 	true,
			"scrollX"	: 	true,
			"lengthMenu":   PAGING_LENGTH_MENU,
			"columns"	: 	[
				{
					"data"	  	 : 'user_type',
					"orderable"	 :  false,
					"searchable" : 	false,
					"render"  	 : function(user_type){
						return VOC_FOR[user_type];
					}
				},
				{
					"data"		 :  {},
					"orderable"	 :  false,
					"searchable" : false,
					"field_name" :  "type",
					"render"  	 :  function(result){
						var type 	=	(result.type) 	   ? result.type 	  :'';
						var vocFor 	=	(result.user_type) ? result.user_type :'';
						return (vocFor == '<%=VOC_FOR_CAPTAIN%>') ? VOC_TYPE_FOR_CAPTAIN[type] : VOC_TYPE_FOR_CLIENT[type];
					}
				},
				{
					"data"		 : "question",
					"orderable"	 :  false,
					"searchable" : false,
				},
				{
					"data"		 : "answer",
					"searchable" : 	false,
					"orderable"	 :  false,
				},
				{
					"data"			: 'created',
					"searchable"	: false,
					"render" 		: function(created){
						return moment(created).tz(DEFAULT_TIME_ZONE).format(DATATABLE_DATE_TIME_FORMAT);
					}
				},
			],
			"ajax":{
				url 	:	"<%=admin_list_url%>/get_captain_voc_list/<%=order_id%>",
				type	: 	"POST",
				dataSrc	: 	function(res){
					adjustPermissionsClass();
					$('#datatable-listing-voc').DataTable().columns.adjust();
					return res.data;
				}
			},
		});

		setTimeout( function () {
			$('#datatable-listing-voc').DataTable().columns.adjust();
		},500);
	});
</script>
