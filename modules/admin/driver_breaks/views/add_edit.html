<div class="row clearfix">
	<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
		<form id="add-break" action="<%=admin_list_url%>/add" data-submit-btn-id="break-add-btn-id" method="post" class="on_click_submit" role="form">
			<div class="modal-dialog modal-lg" role="document">
				<div class="modal-content">
					<div class="modal-header modal-header-seperator p-l-20 p-b-0">
						<h2 class="modal-title">
							<%= __("admin.driver_breaks.add_break"); %>
						</h2>
					</div>
					<div class="modal-body padding-20">
						<div class="row clearfix">
							<div class="col-sm-12">
								<div class="form-group">
									<div class="form-line">
										<label for="user_id" class="control-label col-555">
											<%= __("admin.driver_breaks.captain_name"); %><span class="required"> *</span>
										</label>
										<select class="form-control show-tick" id="user_id" name="user_id" multiple title="<%=__('admin.driver_breaks.select_captain_name') %>" data-live-search="true">
											<%-captain_list%>
										</select>
									</div>
									<span id="user_id_error" class="error"></span>
								</div>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-12">
								<div class="form-group">
									<div class="form-line">
										<label for="duration" class="control-label col-555">
											<%= __("admin.driver_breaks.duration"); %><span class="required"> *</span>
										</label>
										<input type="text" id="duration" class="form-control" name="duration"/>
									</div>
									<span id="duration_error" class="error"></span>
								</div>
							</div>
						</div>
					</div>
					<div class="modal-footer modal-footer-seperator">
						<button type="button" id="break-add-btn-id" class="btn bg-brown btn-sm waves-effect col-white btn-submit" <%- ADMIN_LOADING_TEXT %> >
							<%= __("admin.system.submit"); %>
						</button>
						<button type="button" class="btn bg-blue-grey btn-sm waves-effect col-white" data-dismiss="modal" aria-hidden="true">
							 <%= __("admin.system.cancel"); %>
						</button>
					</div>
				</div>
			</div>
		</form>
	</div>
</div>

<script type="text/javascript">
	/**
	 * Function to submit form
	 */
	$(document).ready(function() {
		$('.btn-submit').click(function(){
			var btnId = $(this).attr('id');
			startTextLoading(btnId);
			ajax_submit('add-break',function(status,response){
				if(status){
					$("#reset").trigger("click");
				}else{
					stopTextLoading(btnId);
				}
			});
		});

		$(".show-tick").selectpicker('refresh');
	});
</script>
