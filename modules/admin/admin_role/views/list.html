<%
	let userType = (user_type) ? user_type : "";
%>
<div class="container-fluid">
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="panel-group" id="panel-group-id" role="tablist" aria-multiselectable="true">
				<div class="panel panel-col-pink">
					<div class="panel-heading" role="tab" id="panel-heading-id">
						<h4 class="panel-title">
							<a role="button" data-toggle="collapse" data-target="#panel-collapse-id" data-parent="#panel-group-id" href="javascript:void(0)" aria-expanded="false" aria-controls="panel-collapse-id">
								 <%= __('admin.system.search'); %>
								<span class="pull-right collapse-toggle-icon"></span>
							</a>
						</h4>
					</div>
					<div id="panel-collapse-id" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="panel-heading-id">
						<div class="panel-body">
							<form id="searchForm" name="searchForm">
								<div class="row clearfix dataTables_wrapper">
									<!-- Search by Name -->
									<div class="col-xs-12 col-sm-4">
										<div class="form-group">
											<div class="form-line">
												<input class="form-control" name="name" id="column_filter_0"  onkeyup="searchDatatable(0)" placeholder="<%= __('admin.admin_role.search_by_role'); %>">
											</div>
										</div>
									</div>
									<!-- datatable reset -->
									<div class="col-xs-12 col-sm-1">
										<div class="form-group">
											<button type="button" id="reset"
												class="btn btn-danger btn-sm waves-effect"><%= __("admin.system.reset")%></button>
										</div>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!--Search End -->
	<!-- Start Listing -->
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="header">
					<h2>
						<%= __("admin.admin_role.manage_role"); %>
					</h2>
					<ul class="header-dropdown m-r--5 btn-right-top-margin">
						<li>
							<!-- <a href="<%=admin_list_url+'/'+userType%>/add" class=' <%= getPermissionClass(module_type,["admin_role","add"]); %>'>
								<button type="button" class="btn btn-sm bg-indigo waves-effect">
									<%= __('admin.admin_role.add_role'); %>
								</button>
							</a> -->
						</li>
					</ul>
				</div>
				<div class="body">
					<table id="datatable-listing" class="row-border hover table table-bordered cb-data-table" cellspacing="0" width="100%">
						<thead>
							<tr>
								<th width="40%"><%= __("admin.admin_role.role"); %></th>
								<th width="40%"><%= __("admin.system.modified"); %></th>
								<th width="20%"><%= __("admin.system.action"); %></th>
							</tr>
						</thead>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>
<%- contentFor("script") %>
<script type="text/javascript">
	/** Function to initialize datatable and get server side data*/
	var dataTable ="";
	$(document).ready(function() {
		dataTable 	= 	$('#datatable-listing').DataTable({
			"bStateSave": true,
			"fnStateSave": function (oSettings, oData) {
				localStorage.setItem('DataTables', JSON.stringify(oData));
			},
			"fnStateLoad": function (oSettings) {
				return JSON.parse(localStorage.getItem('DataTables'));
			},
			"order"		: [[1, "desc"]],
			"sDom"		: "ltipr",
			"serverSide": true,
			"scrollX"	: true,
			"lengthMenu": PAGING_LENGTH_MENU,
			"columns"	: [
				{ "data": 'role_name' },
				{
					"data"	: 'modified',
					"render": function(modified){
						return moment(modified).tz(DEFAULT_TIME_ZONE).format(DATATABLE_DATE_TIME_FORMAT);
					}
				},
				{
					"data"		: {},
					"orderable"	: false,
					"searchable": false,
					"render" 	: function(result){
						var id	=	(result._id)	?	result._id	:"";
						var actionButtons	= '<a href="<%=admin_list_url+'/'+userType%>/edit/'+id+'" class="btn btn-primary btn-sm waves-effect <%= getPermissionClass(module_type,["admin_role","edit"]); %>" ><%= __("admin.system.edit"); %></a>';

						/**Check deletable condition*/
						if(typeof result.not_deletable === typeof undefined || result.not_deletable != "<%=NOT_DELETABLE_ROLE%>"){
							/** Delete Link */
							actionButtons	+=	' <a href="javascript:void(0)" data-href="<%=admin_list_url+'/'+userType%>/delete/'+id+'" class="btn btn-danger btn-sm waves-effect confirm_box <%= getPermissionClass(module_type,["admin_role","delete"]); %>" data-confirm-message="<%= __("admin.admin_role.you_want_to_delete_this_role"); %>" data-confirm-heading="<%= __("admin.system.are_you_sure") %>"><%= __("admin.system.delete"); %></a>';
						}

						return actionButtons;
					}
				}
			],
			"ajax":{
				url 	: "<%= admin_list_url+'/'+userType %>",
				type	: "POST",
				dataSrc	: function(res){
					adjustPermissionsClass();
					return res.data;
				}
			}
		});
	});

	/** Javascript function to search datatable */
	function searchDatatable(columnNumber){
		var query= $('#column_filter_'+columnNumber).val();
		dataTable.column(columnNumber).search(query).draw()
	}//end searchDatatable()
</script>
<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PATH%>datatable_state_storage.js"></script>
