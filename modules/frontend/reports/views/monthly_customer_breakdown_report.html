<div class="container-fluid" id="main-container">
	<!--Search Start -->
	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="panel-group" id="panel-group-id" role="tablist" aria-multiselectable="true">
				<div class="panel panel-col-pink">
					<div class="panel-heading" role="tab" id="panel-heading-id">
						<h4 class="panel-title">
							<a role="button" data-toggle="collapse" data-target="#panel-collapse-id" data-parent="#panel-group-id" href="javascript:void(0)" aria-expanded="false"
							   aria-controls="panel-collapse-id">
								<%= __("system.search"); %>
								<span class="pull-right collapse-toggle-icon"></span>
							</a>
						</h4>
					</div>
					<div id="panel-collapse-id" class="panel-collapse collapse in" role="tabpanel" aria-labelledby="panel-heading-id">
						<div class="panel-body">
							<form id="searchForm" name="searchForm" >
								<div class="row clearfix dataTables_wrapper">
									<!-- Search by year -->
									<div class="col-xs-12 col-sm-4">
										<div class="form-group">
											<div class="form-line">
												<select class="form-control show-tick" id="graph_year" name="graph_year" data-title="<%=__("reports.search_by_year")%>">

												</select>
											</div>
										</div>
									</div>
									<!-- reset button -->
									<div class="col-sm-2">
                                        <button type="button" id="reset_btn" class="btn btn-sm waves-effect btn-danger"
                                            data-href="<%= list_url%>/monthly_customer_breakdown_report">
                                            <%= __("system.reset")%>
                                        </button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!--Search End -->

	<div class="row clearfix">
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="header">
					<h2>
						<%=  __("reports.monthly_customer_breakdown_report"); %>
					</h2>
				</div>
				<div class="body">
					<div id="customer_breakdown" class="p-b-20">
						<h4 class='text-center'> <%= __('reports.no_data_available')%></h4>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<%- contentFor('css') %>
	<link rel="stylesheet" href="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/css/bootstrap-select.css">
<%- contentFor("script") %>
	<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PLUGIN_PATH%>bootstrap-select/js/bootstrap-select.js"></script>
	<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
	<script type="text/javascript">
		google.charts.load('current', {'packages':['bar']});

		$(document).ready(function(){
			google.charts.setOnLoadCallback(drawChart);
		});
		$("#graph_year").change(function(){
			drawChart();
		});
		function drawChart() {
			$("#dataExportBtn").prop("disabled",true);
			if($("#graph_year").val()){
				var requestOptions = {
					url 	: "<%= list_url%>/monthly_customer_breakdown_report",
					method	: "post",
					data	: {year : $("#graph_year").val()}
				};
				$("#customer_breakdown").html('<div class="text-center col-sm-12"><img src="<%= WEBSITE_IMG_URL%>pagination_loader.gif" /></div>');
				ajaxRequest(requestOptions,function(response){
					if(response.years.length  > 0){
						$("#dataExportBtn").prop("disabled",false);
						var data = new google.visualization.DataTable();
						data.addColumn("string", "Months");
						data.addColumn("number", '<%= __("reports.new_customer_without_purchase"); %>');
						data.addColumn("number", '<%= __("reports.new_customer_multi_purchase"); %>');
						data.addColumn("number", '<%= __("reports.repeating_customer"); %>');
						data.addColumn("number", '<%= __("reports.winback_customers"); %>');

						data.addRows(response.result);

						var options = {
							width: 950,
							height: 500,
							axes: {
								x: {
									0: {side: "bottom"}
								}
							},
							legend	: {position : "top"},
							bars	: "vertical", // Required for Material Bar Charts.
						};

						var chart = new google.charts.Bar(document.getElementById('customer_breakdown'));
						chart.draw(data, google.charts.Bar.convertOptions(options));
					}else{
						$("#dataExportBtn").prop("disabled",true);
						$("#customer_breakdown").html("<h4 class='text-center'> <%= __('reports.no_data_available')%></h4>");
					}
				});
			}else{
				$("#customer_breakdown").html("<h4 class='text-center'> <%= __('reports.no_data_available')%></h4>");
			}
		}

		var MIN_YEAR_FOR_REPORT = parseInt("<%=MIN_YEAR_FOR_REPORT%>");
		function getYearDropdown(){
			var currentYear = new Date().getFullYear();
			var yearsOption = "";
			for(yearValue=currentYear; yearValue >= MIN_YEAR_FOR_REPORT; yearValue--){
				yearsOption = '<option value="'+yearValue+'">'+yearValue+'</option>';
				$("#graph_year").append(yearsOption);
				$("#graph_year").selectpicker("refresh");

			}
		};
		getYearDropdown();

        $(document).on("click", "#reset_btn", function (e) {
            var linkHref    = $(this).attr("data-href");
            var anchorHref  = linkHref.replace(WEBSITE_URL, "").split("?")[0];
            localStorage.removeItem("search_/" + anchorHref);
            localStorage.removeItem("search_" + linkHref);
            window.location.reload(true);

        });


        /**
		* Get dropdown value by local storage
		*/

		let tempYearValue =	"";
		if(localStorage["search_" +window.location.pathname]){
			let searchFormData = JSON.parse(localStorage["search_" +window.location.pathname]);
			for(index in searchFormData){
				if(searchFormData[index].name && searchFormData[index].name == "graph_year" && searchFormData[index].value){
					tempYearValue = searchFormData[index].value;
				}
			}
        }

		/**
		* Export Details action
		*
		* @param  null
		*
		* @return void
		*/
		$(document).on("click","#dataExportBtn",function(){
			var yearValue   = $("#graph_year").val();
			if(yearValue){
				var exportURL = "<%=list_url%>/monthly_customer_breakdown_report/export_data?year="+yearValue;
				window.location.href=exportURL;
			}
		});
</script>
<script type="text/javascript" src="<%=WEBSITE_ADMIN_JS_PATH%>datatable_state_storage.js"></script>
