<div class="container-fluid" id="main-container">
    <!--Search Start -->
    <div class="row clearfix">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
            <div class="panel-group" id="panel-group-id" role="tablist" aria-multiselectable="true">
                <div class="panel panel-col-pink">
                    <div class="panel-heading" role="tab" id="panel-heading-id">
                        <h4 class="panel-title">
                            <a role="button" data-toggle="collapse" data-target="#panel-collapse-id"
                                data-parent="#panel-group-id" href="javascript:void(0)" aria-expanded="false"
                                aria-controls="panel-collapse-id">
                                <%= __("system.search"); %>
                                    <span class="pull-right collapse-toggle-icon"></span>
                            </a>
                        </h4>
                    </div>
                    <div id="panel-collapse-id" class="panel-collapse collapse in" role="tabpanel"
                        aria-labelledby="panel-heading-id">
                        <div class="panel-body">
                            <form id="searchForm" name="searchForm">
                                <div class="row clearfix dataTables_wrapper">
                                    <!-- Search by year -->
                                    <div class="col-xs-12 col-sm-4">
                                        <div class="form-group">
                                            <div class="form-line">
                                                <select class="form-control show-tick" id="graph_year" name="graph_year" data-title="<%=__("reports.search_by_year")%>">

                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Search by branch -->
                                    <div class="col-xs-12 col-sm-4">
                                        <div class="form-group">
                                            <div class="form-line">
                                                <select class="form-control show-tick branch_id" id="branch_ids"
                                                    name="search_branch_id" data-live-search="true"
                                                    data-title="<%=__('reports.search_by_branch')%>" multiple>
                                                    <%- branch_list%>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- reset button -->
                                    <div class="col-sm-4">
                                        <button type="button" id="reset_btn" class="btn btn-sm waves-effect btn-danger"
                                            data-href="<%= list_url%>/top_ten_ordered_items_report">
                                            <%= __("system.reset")%>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--Search End -->
    <div class="row clearfix">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
            <div class="card">
                <div class="header">
                    <h2>
                        <%= __("reports.top_ten_ordered_items_report"); %>
                    </h2>
                </div>
                <div class="body">
                    <div id="top_ten_ordered_items_report" class="p-b-20">
                        <h4 class='text-center'>
                            <%= __('reports.no_data_available')%>
                        </h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<%- contentFor('css') %>
    <link rel="stylesheet" href="<%=WEBSITE_JS_PLUGIN_PATH%>bootstrap-select/css/bootstrap-select.css">
<%- contentFor("script") %>
    <script type="text/javascript"
        src="<%=WEBSITE_JS_PLUGIN_PATH%>bootstrap-select/js/bootstrap-select.js"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load("current", { "packages": ["bar"] });

        $(document).ready(function () {
            google.charts.setOnLoadCallback(drawChart);
        });
        $("#graph_year, #branch_ids").change(function(){
		    drawChart();
	    });

        function drawChart() {
            if ($("#graph_year").val()) {
                var branchId = $("#branch_ids").val();
                var requestOptions = {
                    url     : "<%= list_url%>/top_ten_ordered_items_report",
                    method  : "post",
                    data    : { years: $("#graph_year").val(), branch_ids: branchId }
                };
                $("#top_ten_ordered_items_report").html('<div class="text-center col-sm-12"><img src="<%= WEBSITE_IMG_URL%>pagination_loader.gif" /></div>');
                ajaxRequest(requestOptions, function (response) {
                    if (response.years.length > 0) {
                        var data = new google.visualization.DataTable();
                        data.addColumn("string", "Items");

                        response.years.map(rec => {
                            data.addColumn("number", rec);
                        });
                        data.addRows(response.result);
                        var options = {
                            width   : 900,
                            height  : 500,
                            axes    : {
                                x: {
                                    0: { side: "bottom" }
                                }
                            },
                            legend  : { position: "top" },
                            bars    : 'horizontal',

                        };
                        var chart = new google.charts.Bar(document.getElementById("top_ten_ordered_items_report"));
                        chart.draw(data, google.charts.Bar.convertOptions(options));
                    } else {
                        $("#top_ten_ordered_items_report").html("<h4 class='text-center'> <%= __('reports.no_data_available')%></h4>");
                    }
                });
            } else {
                $("#top_ten_ordered_items_report").html("<h4 class='text-center'> <%= __('reports.no_data_available')%></h4>");
            }
        };

        $(document).on("click", "#reset_btn", function (e) {
            var linkHref    = $(this).attr("data-href");
            var anchorHref  = linkHref.replace(WEBSITE_URL, "").split("?")[0];
            localStorage.removeItem("search_/" + anchorHref);
            localStorage.removeItem("search_" + linkHref);
            window.location.reload(true);
        });

        var MIN_YEAR_FOR_REPORT = parseInt("<%=MIN_YEAR_FOR_REPORT%>");
		function getYearDropdown(){
			var currentYear = new Date().getFullYear();
			var yearsOption = "";
			for(yearValue=currentYear; yearValue >= MIN_YEAR_FOR_REPORT; yearValue--){
				yearsOption = '<option value="'+yearValue+'">'+yearValue+'</option>';
				$("#graph_year").append(yearsOption);
				$("#graph_year").selectpicker("refresh");

			}
		};
		getYearDropdown();

        /**
        * Get dropdown value by local storage
        */
        let tempBranchId    = "";
        let tempYear        = "";
        if (localStorage["search_" + window.location.pathname]) {
            let searchFormData = JSON.parse(localStorage["search_" + window.location.pathname]);
            for (index in searchFormData) {
                if (searchFormData[index].name && searchFormData[index].name == "search_branch_id" && searchFormData[index].value) {
                    tempBranchId = searchFormData[index].value;
                }
                if (searchFormData[index].name && searchFormData[index].name == "graph_year" && searchFormData[index].value) {
                    tempYear = searchFormData[index].value;
                }
            }
        }

        /**
        * Export Details action
        *
        * @param  null
        *
        * @return void
        */
        $(document).on("click", "#dataExportBtn", function () {
            var branchIds   = $("#branch_ids").val();
            var years       = $("#graph_year").val();
            var exportURL   = "<%=list_url%>/top_ten_ordered_items_report/export_data?years=" + years;
            if (branchIds) exportURL += "&branch_ids=" + branchIds;
            window.location.href = exportURL;
        });
    </script>
    <script type="text/javascript" src="<%=WEBSITE_JS_PATH%>datatable_state_storage.js"></script>
