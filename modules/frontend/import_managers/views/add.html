<div class="container-fluid" id="main-container">
	<div class="row clearfix" >
		<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
			<div class="card">
				<div class="header">
					<h2>
						<%= __("import_managers.add_import_manager"); %>
					</h2>
					<ul class="header-dropdown m-r--5 btn-right-top-margin">
						<li>
							<a href="<%=WEBSITE_URL+"import_managers/"%>">
								<button type="button" class="btn bg-indigo btn-sm waves-effect">
									<%= __("system.back"); %>
								</button>
							</a>
						</li>
					</ul>
				</div>
				<div class="body">
					<form id="add-import-manager" data-submit-btn-id="import-manager-add-btn-id" method="post" class="on_click_submit" role="form" enctype="mutlipart/form-data">
						<div class="row clearfix">
							<div class="col-sm-3">
								<div class="form-group">
									<div class="form-lin">
										<label for="imported_file" class="control-label">
											<%= __("import_managers.file"); %>
											<span class="required"> *</span>
										</label>
										<input type="file" data-input="false" name="imported_file" class="form-control jfilestyle" id="imported_file" />
										<span class='tooltipShow tooltipHelp brand-tooltip' title="" data-html="true" data-toggle="tooltip"  data-original-title="<%= __('system.extension_message',ALLOWED_IMPORT_MANAGER_EXTENSIONS.join(', '))%>">
											<i class="material-icons">info</i>
										</span>
									</div>
									<span id="imported_file_error" class="error"></span>
								</div>
							</div>
							<div class="col-sm-3">
								<a href="<%=IMPORT_MANAGER_SAMPLE_FILE_PATH%>" class="text-decoration-none" download>
									<button type="button" class="btn bg-indigo btn-sm waves-effect">
										<%= __("import_managers.download_sample_file")%>
									</button>
								</a>
							</div>
						</div>
						<div class="row clearfix">
							<div class="col-sm-12">
								<div class="form-group">
									<div class="form-line">
										<label for="note" class="control-label">
											<%= __("import_managers.note"); %>
											<span class="required"> *</span>
										</label>
										<textarea id="note" class="form-control resize-none" name="note" rows="5" cols="50"></textarea>
									</div>
									<span id="note_error" class="error"></span>
								</div>
							</div>
						</div>
						<button type="button" id="import-manager-add-btn-id" class="btn bg-brown btn-sm waves-effect btn-submit" <%- FRONT_LOADING_TEXT %> > <%= __("system.submit"); %></button>
						<a href="javascript:location.reload(true);" class="text-decoration-none"><button type="button" class="btn  bg-blue-grey btn-sm waves-effect"><%= __("system.reset"); %></button></a>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>

<%- contentFor('css') %>
	<link rel="stylesheet" href="<%=WEBSITE_CSS_PATH%>jquery-filestyle.min.css">
	<link rel="stylesheet" href="<%=WEBSITE_JS_PLUGIN_PATH%>bootstrap-select/css/bootstrap-select.css">

<%- contentFor("script") %>
	<script type="text/javascript" src="<%=WEBSITE_JS_PLUGIN_PATH%>bootstrap-select/js/bootstrap-select.js"></script>
	<script type="text/javascript" src="<%=WEBSITE_JS_PATH%>jquery-filestyle.min.js"></script>
	<script type="text/javascript">
		/**
		* Function to submit form
		*/
		$('.btn-submit').click(function(){
			var btnId = $(this).attr('id');
			startTextLoading(btnId);
			submit_multipart_form('add-import-manager',function(status,response){
				if(status){
					window.location.href = response.redirect_url;
				}
				else{
					stopTextLoading(btnId);
				}
			});
		});
	</script>
